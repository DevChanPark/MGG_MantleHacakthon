services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mgg
      POSTGRES_PASSWORD: mgg
      POSTGRES_DB: mgg
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mgg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgg -d mgg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mgg_postgres_data:
